services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trade_chaser
      POSTGRES_PASSWORD: trade_chaser
      POSTGRES_DB: trade_chaser
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 백엔드가 "DB가 준비된 뒤에" 시작하도록 상태 검사
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_chaser -d trade_chaser"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .                       # 같은 폴더의 Dockerfile로 이미지 빌드
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy # DB healthcheck 통과 후에 시작
    environment:
      # ⚠️ 컨테이너 안에서는 DB 주소가 localhost가 아니라 서비스 이름 'db' 입니다.
      DATABASE_URL: postgresql+psycopg://trade_chaser:trade_chaser@db:5432/trade_chaser
      # 팀원들이 각자 로컬 Vite 서버로 이 VM 백엔드에 붙을 때 포트 충돌로 5173 이후로
      # 밀리는 경우(5174, 5175...)까지 여유 있게 허용한다.
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,https://trend-chaser.madcamp-kaist.org
      SECRET_KEY: change-this-to-a-random-secret
      # 아래 키는 backend/.env 에 값이 있으면 자동 주입됩니다(없으면 빈 값 → 스텁 동작).
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:9b}
    ports:
      - "8000:8000"
    volumes:
      # 스캔 배치를 docker compose exec로 실행해도 호스트 개발 서버와
      # 컨테이너 API가 동일한 결과 캐시를 읽도록 공유한다.
      - ./data:/app/data
    # 컨테이너가 뜨면 마이그레이션 → 기준 데이터 → 미국 종목 → 서버 실행을 자동 수행
    # 종목 import는 기존 티커를 건너뛰므로 재시작해도 중복 삽입되지 않는다.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed.seed_data &&
             python -m app.seed.import_us_stocks &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:

networks:
  default:
    driver: bridge
    driver_opts:
      # VM의 실제 아웃바운드 인터페이스(ens3) MTU가 1450인데 도커 기본 브리지는 1500이라
      # TLS 핸드셰이크처럼 조금 큰 패킷이 PMTU 블랙홀로 드롭되던 문제(Polygon API 타임아웃)
      # 를 막기 위해 브리지 MTU를 호스트에 맞춘다.
      com.docker.network.driver.mtu: "1450"
